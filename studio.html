<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux — Gradient Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070708;
    --panel:#0e0e10;
    --line:rgba(255,255,255,0.08);
    --ink:#f4f1ea;
    --dim:rgba(244,241,234,0.42);
    --dimmer:rgba(244,241,234,0.22);
    --accent:#ff3d7f;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'DM Mono',monospace;
    display:flex;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ─── Stage ─────────────────────────────────── */
  .stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:
      radial-gradient(120% 120% at 50% 0%, #101012 0%, #070708 60%);
  }
  .stage::before{
    content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(70% 70% at 50% 50%,#000 0%,transparent 80%);
            mask-image:radial-gradient(70% 70% at 50% 50%,#000 0%,transparent 80%);
    opacity:.5;
    pointer-events:none;
  }
  .frame{
    position:relative;
    aspect-ratio:9/16;
    height:min(92vh, calc((100vw - 360px) * 16 / 9));
    border-radius:26px;
    overflow:hidden;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.07),
      0 40px 120px -30px rgba(0,0,0,0.9),
      0 0 80px -20px rgba(255,61,127,0.12);
  }
  canvas#gl{display:block;width:100%;height:100%}

  .stamp{
    position:absolute;left:22px;top:18px;z-index:3;
    font-size:11px;letter-spacing:.32em;text-transform:uppercase;
    color:rgba(255,255,255,.5);mix-blend-mode:overlay;
    pointer-events:none;
  }
  .res{
    position:absolute;right:22px;bottom:18px;z-index:3;
    font-size:11px;letter-spacing:.18em;
    color:rgba(255,255,255,.45);mix-blend-mode:overlay;
    pointer-events:none;
  }

  /* ─── Panel ─────────────────────────────────── */
  .panel{
    width:360px;
    flex-shrink:0;
    background:var(--panel);
    border-left:1px solid var(--line);
    height:100vh;
    overflow-y:auto;
    padding:26px 24px 60px;
  }
  .panel::-webkit-scrollbar{width:8px}
  .panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}

  .brand{
    font-family:'Instrument Serif',serif;
    font-size:38px;line-height:.9;
    letter-spacing:-.01em;
    margin-bottom:2px;
  }
  .brand em{font-style:italic;color:var(--accent)}
  .tagline{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--dim);margin-bottom:26px;
  }

  .group{margin-bottom:26px}
  .group h3{
    font-family:'DM Mono',monospace;
    font-weight:500;
    font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--dimmer);
    padding-bottom:10px;margin-bottom:14px;
    border-bottom:1px solid var(--line);
  }

  .ctrl{margin-bottom:15px}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .ctrl label{font-size:12px;letter-spacing:.04em;color:var(--ink)}
  .ctrl .val{font-size:11px;color:var(--accent);font-variant-numeric:tabular-nums}

  input[type=range]{
    -webkit-appearance:none;appearance:none;
    width:100%;height:2px;background:rgba(255,255,255,.14);
    outline:none;cursor:pointer;border-radius:2px;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;
    width:13px;height:13px;border-radius:50%;
    background:var(--ink);border:2px solid var(--bg);
    box-shadow:0 0 0 1px rgba(255,255,255,.2);
    transition:transform .12s, background .12s;
  }
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25);background:var(--accent)}
  input[type=range]::-moz-range-thumb{
    width:13px;height:13px;border-radius:50%;border:2px solid var(--bg);
    background:var(--ink);cursor:pointer;
  }

  /* palette */
  .swatches{display:flex;gap:8px;margin-bottom:14px}
  .sw{position:relative;flex:1;aspect-ratio:1;border-radius:8px;overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);cursor:pointer}
  .sw input{position:absolute;inset:-6px;width:130%;height:130%;border:none;
            background:none;cursor:pointer;opacity:0}
  .presets{display:flex;flex-wrap:wrap;gap:7px}
  .preset{
    font-size:11px;letter-spacing:.05em;
    padding:6px 11px;border:1px solid var(--line);border-radius:20px;
    color:var(--dim);background:none;cursor:pointer;
    transition:all .15s;
  }
  .preset:hover{color:var(--ink);border-color:rgba(255,255,255,.3)}

  /* buttons */
  .btn-row{display:flex;gap:9px;margin-top:6px}
  .btn{
    flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    background:rgba(255,255,255,.03);color:var(--ink);
    font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;
    cursor:pointer;transition:all .15s;
  }
  .btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.25)}
  .btn svg{width:14px;height:14px}
  .btn.primary{
    background:var(--accent);border-color:var(--accent);color:#11070c;font-weight:500;
  }
  .btn.primary:hover{background:#ff5a92;box-shadow:0 8px 30px -10px var(--accent)}
  .btn.primary.busy{opacity:.6;pointer-events:none}

  .hint{font-size:10.5px;line-height:1.55;color:var(--dimmer);margin-top:12px;letter-spacing:.02em}

  #toast{
    position:fixed;bottom:24px;left:calc(50% - 180px);transform:translate(-50%,8px);
    background:rgba(20,20,22,.92);border:1px solid var(--line);
    backdrop-filter:blur(20px);
    padding:11px 20px;border-radius:10px;font-size:12px;letter-spacing:.04em;
    opacity:0;pointer-events:none;transition:all .3s;z-index:50;
  }
  #toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div class="stage">
  <div class="frame">
    <canvas id="gl"></canvas>
    <div class="stamp">Flux 01</div>
    <div class="res">1080 × 1920</div>
  </div>
</div>

<aside class="panel">
  <div class="brand">Flux<em>.</em></div>
  <div class="tagline">Gradient Studio · WebGL2</div>

  <div class="group">
    <h3>Field</h3>
    <div id="field-ctrls"></div>
  </div>

  <div class="group">
    <h3>Light & Angle</h3>
    <div id="light-ctrls"></div>
  </div>

  <div class="group">
    <h3>Silhouette</h3>
    <div id="mask-ctrls"></div>
  </div>

  <div class="group">
    <h3>Finish</h3>
    <div id="finish-ctrls"></div>
  </div>

  <div class="group">
    <h3>Palette</h3>
    <div class="swatches" id="swatches"></div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="group">
    <h3>Compose</h3>
    <div class="btn-row">
      <button class="btn" id="playBtn">
        <svg viewBox="0 0 14 14" fill="currentColor"><rect x="3" y="2.5" width="2.6" height="9"/><rect x="8.4" y="2.5" width="2.6" height="9"/></svg>
        <span>Pause</span>
      </button>
      <button class="btn" id="seedBtn">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h7M2 4l2-2M2 4l2 2M12 10H5M12 10l-2-2M12 10l-2 2"/></svg>
        <span>Shuffle</span>
      </button>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="exportBtn">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5v8M4 7l3 3 3-3M2 12.5h10"/></svg>
        <span>Export PNG</span>
      </button>
    </div>
    <p class="hint">Export renders an offscreen 1080×1920 buffer — pixel-identical to the preview, independent of screen size.</p>
  </div>
</aside>

<div id="toast"></div>

<script type="module">
/* ════════════════════════════════════════════════════════════
   FLUX — WebGL2 domain-warped gradient studio (MVP)
   ════════════════════════════════════════════════════════════ */

const VERT = `#version 300 es
const vec2 v[3] = vec2[3](vec2(-1.,-1.), vec2(3.,-1.), vec2(-1.,3.));
void main(){ gl_Position = vec4(v[gl_VertexID], 0., 1.); }`;

const FRAG = `#version 300 es
precision highp float;
out vec4 outColor;

uniform vec2  uRes;
uniform float uTime;
uniform float uSeed;
uniform float uScale;
uniform float uWarp;
uniform float uDetail;     // warp iterations feel via freq
uniform float uAngle;      // light / gradient direction
uniform float uLight;      // crease strength
uniform float uContrast;
uniform float uGamma;
uniform float uGrain;
uniform float uSpread;     // silhouette column width
uniform float uThresh;     // silhouette cutoff
uniform float uSoft;       // silhouette edge softness
uniform vec3  uC0,uC1,uC2,uC3,uC4;

float hash21(vec2 p){
  p = fract(p*vec2(123.34, 345.45));
  p += dot(p, p+34.345);
  return fract(p.x*p.y);
}
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  vec2 u=f*f*(3.0-2.0*f);
  float a=hash21(i), b=hash21(i+vec2(1,0));
  float c=hash21(i+vec2(0,1)), d=hash21(i+vec2(1,1));
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p*uDetail; a*=0.5; }
  return v;
}
vec3 palette(float t){
  t=clamp(t,0.0,1.0);
  if(t<0.25) return mix(uC0,uC1, t/0.25);
  if(t<0.50) return mix(uC1,uC2,(t-0.25)/0.25);
  if(t<0.75) return mix(uC2,uC3,(t-0.50)/0.25);
  return            mix(uC3,uC4,(t-0.75)/0.25);
}

void main(){
  vec2 c = (gl_FragCoord.xy - 0.5*uRes) / uRes.y;   // aspect-correct, centered
  vec2 p = c * uScale;
  float t = uTime;

  // ── domain warping (IQ) ─────────────────────────────
  vec2 q = vec2( fbm(p + uSeed),
                 fbm(p + vec2(5.2,1.3) + uSeed) );
  vec2 r = vec2( fbm(p + uWarp*q + vec2(1.7,9.2) + 0.15*t),
                 fbm(p + uWarp*q + vec2(8.3,2.8) - 0.12*t) );
  float h = fbm(p + uWarp*r);

  // ── directional crease shading (the "side angles") ──
  vec2 g  = vec2(dFdx(h), dFdy(h)) * uRes.y;
  vec3 n  = normalize(vec3(-g * uLight, 1.0));
  vec2 ld = vec2(cos(uAngle), sin(uAngle));
  float lam = dot(n, normalize(vec3(ld, 0.7))) * 0.5 + 0.5;

  // ── value → tone ────────────────────────────────────
  float v = h*0.60 + lam*0.62;
  v = (v - 0.5) * uContrast + 0.5;
  v = pow(clamp(v, 0.0, 1.0), uGamma);

  // ── silhouette mask ─────────────────────────────────
  float spine = 1.0 - smoothstep(0.0, uSpread, abs(c.x));
  float vfade = 1.0 - smoothstep(0.40, 0.52, abs(c.y));
  float blob  = fbm(p*0.45 + r*0.5 + uSeed*1.7) * 0.6 + spine * 0.7;
  blob *= mix(0.55, 1.0, vfade);
  float mask = smoothstep(uThresh - uSoft, uThresh + uSoft, blob);

  vec3 col = palette(v) * mask;

  // ── film grain ──────────────────────────────────────
  float gr = hash21(gl_FragCoord.xy + t*60.0) - 0.5;
  col += gr * uGrain;

  outColor = vec4(max(col, 0.0), 1.0);
}`;

/* ─── State ─────────────────────────────────────────── */
const params = {
  scale:    { v:2.20, min:0.6,  max:5.0,  step:0.01, label:'Scale',    grp:'field'  },
  warp:     { v:4.20, min:0.0,  max:8.0,  step:0.01, label:'Warp',     grp:'field'  },
  detail:   { v:1.00, min:0.85, max:1.30, step:0.005,label:'Detail',   grp:'field'  },
  angle:    { v:1.05, min:0.0,  max:6.283,step:0.001,label:'Angle',    grp:'light'  },
  light:    { v:1.60, min:0.0,  max:6.0,  step:0.01, label:'Crease',   grp:'light'  },
  spread:   { v:0.30, min:0.05, max:0.6,  step:0.005,label:'Spread',   grp:'mask'   },
  thresh:   { v:0.62, min:0.3,  max:1.0,  step:0.005,label:'Threshold',grp:'mask'   },
  soft:     { v:0.13, min:0.01, max:0.4,  step:0.005,label:'Softness', grp:'mask'   },
  contrast: { v:1.30, min:0.5,  max:2.5,  step:0.01, label:'Contrast', grp:'finish' },
  gamma:    { v:1.10, min:0.5,  max:2.2,  step:0.01, label:'Gamma',    grp:'finish' },
  grain:    { v:0.085,min:0.0,  max:0.25, step:0.001,label:'Grain',    grp:'finish' },
  speed:    { v:0.15, min:0.0,  max:1.0,  step:0.01, label:'Speed',    grp:'finish' },
};

let palette = ['#000000','#5c0026','#e8197a','#ff6a1a','#ffd23a'];

const PRESETS = {
  'Magma':   ['#000000','#5c0026','#e8197a','#ff6a1a','#ffd23a'],
  'Cyan':    ['#000208','#062b3d','#0fb6c6','#7df0d0','#eafff6'],
  'Ember':   ['#040000','#3a0a02','#c2320a','#ff8a1e','#ffe27a'],
  'Iris':    ['#02000a','#1e0a4a','#6a36d9','#c46bff','#f3e6ff'],
  'Lime':    ['#020600','#143a06','#5cba1a','#b6f02a','#f2ffd0'],
  'Mono':    ['#000000','#222222','#777777','#cccccc','#ffffff'],
};

let seed = Math.random()*100;
let playing = true;
let startT = performance.now();
let clockT = 0;

/* ─── GL setup ──────────────────────────────────────── */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { antialias:true, preserveDrawingBuffer:false });
if(!gl){ document.body.innerHTML = '<p style="margin:auto;font-family:monospace">WebGL2 not supported in this browser.</p>'; throw new Error('no webgl2'); }

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const U = {};
for(const name of ['uRes','uTime','uSeed','uScale','uWarp','uDetail','uAngle','uLight','uContrast','uGamma','uGrain','uSpread','uThresh','uSoft','uC0','uC1','uC2','uC3','uC4'])
  U[name] = gl.getUniformLocation(prog, name);

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);

function hex2rgb(h){
  const v = parseInt(h.slice(1),16);
  return [((v>>16)&255)/255, ((v>>8)&255)/255, (v&255)/255];
}

function setUniforms(w, h){
  gl.uniform2f(U.uRes, w, h);
  gl.uniform1f(U.uTime, clockT);
  gl.uniform1f(U.uSeed, seed);
  gl.uniform1f(U.uScale, params.scale.v);
  gl.uniform1f(U.uWarp, params.warp.v);
  gl.uniform1f(U.uDetail, params.detail.v);
  gl.uniform1f(U.uAngle, params.angle.v);
  gl.uniform1f(U.uLight, params.light.v);
  gl.uniform1f(U.uContrast, params.contrast.v);
  gl.uniform1f(U.uGamma, params.gamma.v);
  gl.uniform1f(U.uGrain, params.grain.v);
  gl.uniform1f(U.uSpread, params.spread.v);
  gl.uniform1f(U.uThresh, params.thresh.v);
  gl.uniform1f(U.uSoft, params.soft.v);
  const cols = palette.map(hex2rgb);
  gl.uniform3fv(U.uC0, cols[0]); gl.uniform3fv(U.uC1, cols[1]);
  gl.uniform3fv(U.uC2, cols[2]); gl.uniform3fv(U.uC3, cols[3]);
  gl.uniform3fv(U.uC4, cols[4]);
}

/* ─── Preview sizing ───────────────────────────────── */
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const r = canvas.getBoundingClientRect();
  const w = Math.round(r.width * dpr), h = Math.round(r.height * dpr);
  if(canvas.width !== w || canvas.height !== h){ canvas.width = w; canvas.height = h; }
}
window.addEventListener('resize', resize);

/* ─── Render loop ──────────────────────────────────── */
function frame(){
  if(playing) clockT = (performance.now() - startT)/1000 * params.speed.v;
  resize();
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0,0,canvas.width,canvas.height);
  setUniforms(canvas.width, canvas.height);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}

/* ─── Export 1080×1920 via offscreen FBO ───────────── */
function exportPNG(){
  const btn = document.getElementById('exportBtn');
  btn.classList.add('busy');
  const W = 1080, H = 1920;

  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);

  gl.viewport(0,0,W,H);
  setUniforms(W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  const px = new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.deleteFramebuffer(fbo);
  gl.deleteTexture(tex);

  // flip vertically (GL origin is bottom-left)
  const out = document.createElement('canvas');
  out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  const img = ctx.createImageData(W, H);
  for(let y=0;y<H;y++){
    const src = (H-1-y)*W*4, dst = y*W*4;
    img.data.set(px.subarray(src, src+W*4), dst);
  }
  ctx.putImageData(img, 0, 0);

  out.toBlob(blob=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `flux_${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
    btn.classList.remove('busy');
    toast('Exported · 1080×1920 PNG');
  }, 'image/png');
}

/* ─── UI build ─────────────────────────────────────── */
function makeSlider(key){
  const p = params[key];
  const wrap = document.createElement('div'); wrap.className='ctrl';
  wrap.innerHTML = `<div class="row"><label>${p.label}</label><span class="val"></span></div>`;
  const input = document.createElement('input');
  input.type='range'; input.min=p.min; input.max=p.max; input.step=p.step; input.value=p.v;
  const val = wrap.querySelector('.val');
  const fmt = v => (p.step < 0.01 ? v.toFixed(3) : v.toFixed(2));
  val.textContent = fmt(p.v);
  input.addEventListener('input', ()=>{ p.v=parseFloat(input.value); val.textContent=fmt(p.v); });
  wrap.appendChild(input);
  p._input = input; p._val = val; p._fmt = fmt;
  return wrap;
}
for(const key in params){
  const grp = params[key].grp;
  document.getElementById(grp+'-ctrls').appendChild(makeSlider(key));
}

// swatches
function buildSwatches(){
  const c = document.getElementById('swatches'); c.innerHTML='';
  palette.forEach((hex,i)=>{
    const sw = document.createElement('div'); sw.className='sw'; sw.style.background=hex;
    const inp = document.createElement('input'); inp.type='color'; inp.value=hex;
    inp.addEventListener('input', ()=>{ palette[i]=inp.value; sw.style.background=inp.value; });
    sw.appendChild(inp); c.appendChild(sw);
  });
}
buildSwatches();

// presets
const presetBox = document.getElementById('presets');
for(const name in PRESETS){
  const b = document.createElement('button'); b.className='preset'; b.textContent=name;
  b.addEventListener('click', ()=>{ palette = PRESETS[name].slice(); buildSwatches(); });
  presetBox.appendChild(b);
}

// play / pause
const playBtn = document.getElementById('playBtn');
playBtn.addEventListener('click', ()=>{
  playing = !playing;
  if(playing) startT = performance.now() - clockT/Math.max(params.speed.v,0.0001)*1000;
  playBtn.querySelector('span').textContent = playing ? 'Pause' : 'Play';
});

// shuffle
document.getElementById('seedBtn').addEventListener('click', ()=>{
  seed = Math.random()*100;
  params.angle.v = Math.random()*6.283;
  params.warp.v  = 2.5 + Math.random()*4;
  params.angle._input.value = params.angle.v; params.angle._val.textContent = params.angle._fmt(params.angle.v);
  params.warp._input.value  = params.warp.v;  params.warp._val.textContent  = params.warp._fmt(params.warp.v);
});

document.getElementById('exportBtn').addEventListener('click', exportPNG);

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400);
}

resize();
requestAnimationFrame(frame);
</script>
</body>
