<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flux — Gradient Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070708;--panel:#0e0e10;--line:rgba(255,255,255,0.08);
    --ink:#f4f1ea;--dim:rgba(244,241,234,0.42);--dimmer:rgba(244,241,234,0.22);--accent:#ff3d7f;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;
    display:flex;overflow:hidden;-webkit-font-smoothing:antialiased}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;
    background:radial-gradient(120% 120% at 50% 0%,#101012 0%,#070708 60%);overflow:hidden}
  .stage::before{content:'';position:absolute;inset:0;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask-image:radial-gradient(70% 70% at 50% 50%,#000 0%,transparent 80%);
            mask-image:radial-gradient(70% 70% at 50% 50%,#000 0%,transparent 80%);
    opacity:.5;pointer-events:none}

  .frame{position:relative;border-radius:26px;overflow:hidden;
    box-shadow:0 0 0 1px rgba(255,255,255,0.07),0 40px 120px -30px rgba(0,0,0,.9),
      0 0 80px -20px rgba(255,61,127,.12);
    transition:width .25s cubic-bezier(.4,0,.2,1),height .25s cubic-bezier(.4,0,.2,1)}
  canvas#gl{display:block;width:100%;height:100%}

  .stamp{position:absolute;left:18px;top:15px;z-index:3;font-size:10px;letter-spacing:.32em;
    text-transform:uppercase;color:rgba(255,255,255,.5);mix-blend-mode:overlay;pointer-events:none}
  .res-badge{position:absolute;right:18px;bottom:15px;z-index:3;font-size:10px;letter-spacing:.15em;
    color:rgba(255,255,255,.45);mix-blend-mode:overlay;pointer-events:none}

  /* ── Panel ─────────────────────────────────────── */
  .panel{width:360px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);
    height:100vh;overflow-y:auto;padding:26px 24px 60px}
  .panel::-webkit-scrollbar{width:8px}
  .panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
  .brand{font-family:'Instrument Serif',serif;font-size:38px;line-height:.9;letter-spacing:-.01em;margin-bottom:2px}
  .brand em{font-style:italic;color:var(--accent)}
  .tagline{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:26px}

  .group{margin-bottom:26px}
  .group h3{font-weight:500;font-size:10px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--dimmer);padding-bottom:10px;margin-bottom:14px;border-bottom:1px solid var(--line)}

  /* mode / ratio grid */
  .btn-grid{display:grid;gap:7px}
  .btn-grid.col3{grid-template-columns:repeat(3,1fr)}
  .btn-grid.col6{grid-template-columns:repeat(6,1fr)}
  .grid-btn{padding:9px 4px;border:1px solid var(--line);border-radius:9px;
    background:rgba(255,255,255,.03);color:var(--dim);
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.04em;
    cursor:pointer;transition:all .15s;text-align:center;line-height:1.3;white-space:nowrap}
  .grid-btn:hover{color:var(--ink);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
  .grid-btn.active{border-color:var(--accent);color:var(--ink);background:rgba(255,61,127,.12)}

  /* scale row */
  .scale-row{display:flex;gap:7px;margin-top:10px}
  .scale-btn{flex:1;padding:7px 4px;border:1px solid var(--line);border-radius:7px;
    background:rgba(255,255,255,.03);color:var(--dim);
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;
    cursor:pointer;transition:all .15s;text-align:center}
  .scale-btn:hover{color:var(--ink);border-color:rgba(255,255,255,.25);background:rgba(255,255,255,.06)}
  .scale-btn.active{border-color:var(--accent);color:var(--ink);background:rgba(255,61,127,.12)}

  .res-preview{font-size:11px;color:var(--dimmer);letter-spacing:.08em;margin-top:9px;text-align:center}

  .ctrl{margin-bottom:15px}
  .ctrl .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .ctrl label{font-size:12px;letter-spacing:.04em;color:var(--ink)}
  .ctrl .val{font-size:11px;color:var(--accent);font-variant-numeric:tabular-nums}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;
    background:rgba(255,255,255,.14);outline:none;cursor:pointer;border-radius:2px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:13px;height:13px;border-radius:50%;background:var(--ink);border:2px solid var(--bg);
    box-shadow:0 0 0 1px rgba(255,255,255,.2);transition:transform .12s,background .12s}
  input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.25);background:var(--accent)}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
    border:2px solid var(--bg);background:var(--ink);cursor:pointer}

  .swatches{display:flex;gap:8px;margin-bottom:14px}
  .sw{position:relative;flex:1;aspect-ratio:1;border-radius:8px;overflow:hidden;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);cursor:pointer}
  .sw input{position:absolute;inset:-6px;width:130%;height:130%;border:none;background:none;cursor:pointer;opacity:0}
  .presets{display:flex;flex-wrap:wrap;gap:7px}
  .preset{font-size:11px;letter-spacing:.05em;padding:6px 11px;border:1px solid var(--line);
    border-radius:20px;color:var(--dim);background:none;cursor:pointer;transition:all .15s}
  .preset:hover{color:var(--ink);border-color:rgba(255,255,255,.3)}

  .btn-row{display:flex;gap:9px;margin-top:6px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    background:rgba(255,255,255,.03);color:var(--ink);
    font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
  .btn:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.25)}
  .btn svg{width:14px;height:14px}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#11070c;font-weight:500}
  .btn.primary:hover{background:#ff5a92;box-shadow:0 8px 30px -10px var(--accent)}
  .btn.primary.busy{opacity:.6;pointer-events:none}
  .hint{font-size:10.5px;line-height:1.55;color:var(--dimmer);margin-top:12px;letter-spacing:.02em}

  #toast{position:fixed;bottom:24px;left:calc(50% - 180px);transform:translate(-50%,8px);
    background:rgba(20,20,22,.92);border:1px solid var(--line);backdrop-filter:blur(20px);
    padding:11px 20px;border-radius:10px;font-size:12px;letter-spacing:.04em;
    opacity:0;pointer-events:none;transition:all .3s;z-index:50}
  #toast.show{opacity:1;transform:translate(-50%,0)}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="frame" id="frame">
    <canvas id="gl"></canvas>
    <div class="stamp" id="modeStamp">Flow</div>
    <div class="res-badge" id="resBadge">1080 × 1920</div>
  </div>
</div>

<aside class="panel">
  <div class="brand">Flux<em>.</em></div>
  <div class="tagline">Gradient Studio · WebGL2</div>

  <div class="group">
    <h3>Pattern</h3>
    <div class="btn-grid col3" id="modes"></div>
  </div>

  <div class="group">
    <h3>Canvas</h3>
    <div class="btn-grid col6" id="ratios"></div>
    <div class="scale-row" id="scales"></div>
    <div class="res-preview" id="resPreview">1080 × 1920 px</div>
  </div>

  <div class="group"><h3>Field</h3><div id="field-ctrls"></div></div>
  <div class="group"><h3>Light & Angle</h3><div id="light-ctrls"></div></div>
  <div class="group"><h3>Silhouette</h3><div id="mask-ctrls"></div></div>
  <div class="group"><h3>Finish</h3><div id="finish-ctrls"></div></div>

  <div class="group">
    <h3>Palette</h3>
    <div class="swatches" id="swatches"></div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="group">
    <h3>Compose</h3>
    <div class="btn-row">
      <button class="btn" id="seedBtn">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 4h7M2 4l2-2M2 4l2 2M12 10H5M12 10l-2-2M12 10l-2 2"/></svg>
        Shuffle Shape
      </button>
      <button class="btn" id="colorBtn">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="7" cy="7" r="5.3"/><circle cx="5" cy="5.2" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="5.2" r="1" fill="currentColor" stroke="none"/><circle cx="6" cy="9" r="1" fill="currentColor" stroke="none"/></svg>
        Random Colors
      </button>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="exportBtn">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5v8M4 7l3 3 3-3M2 12.5h10"/></svg>
        Export PNG
      </button>
    </div>
    <p class="hint">Export renders an offscreen buffer at full resolution — pixel-identical to preview, independent of screen size.</p>
  </div>
</aside>

<div id="toast"></div>

<script type="module">
/* ════════════════════════════════════════════════════════════
   FLUX — WebGL2 multi-mode gradient studio
   ════════════════════════════════════════════════════════════ */

const VERT = `#version 300 es
const vec2 v[3] = vec2[3](vec2(-1.,-1.),vec2(3.,-1.),vec2(-1.,3.));
void main(){ gl_Position = vec4(v[gl_VertexID],0.,1.); }`;

const FRAG = `#version 300 es
precision highp float;
out vec4 outColor;

#define PI 3.14159265359

uniform vec2  uRes;
uniform float uSeed;
uniform float uScale;
uniform float uWarp;
uniform float uAngle;
uniform float uLight;
uniform float uContrast;
uniform float uGamma;
uniform float uGrain;
uniform float uSpread;
uniform float uThresh;
uniform float uSoft;
uniform int   uMode;
uniform vec3  uC0,uC1,uC2,uC3,uC4;

float hash21(vec2 p){
  p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y);
}
float vnoise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  float a=hash21(i),b=hash21(i+vec2(1,0)),c=hash21(i+vec2(0,1)),d=hash21(i+vec2(1,1));
  return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);
}
float fbm(vec2 p){
  float v=0.,a=0.6; mat2 m=mat2(1.4,1.,-1.,1.4);
  for(int i=0;i<3;i++){v+=a*vnoise(p);p=m*p;a*=0.5;} return v;
}
float fbm5(vec2 p){
  float v=0.,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);
  for(int i=0;i<5;i++){v+=a*vnoise(p);p=m*p;a*=0.5;} return v;
}

float modeFlow(vec2 p){
  vec2 q=vec2(fbm(p+uSeed),fbm(p+vec2(5.2,1.3)+uSeed));
  vec2 r=vec2(fbm(p+uWarp*q+vec2(1.7,9.2)),fbm(p+uWarp*q+vec2(8.3,2.8)));
  return fbm(p+uWarp*r);
}
float modeMarble(vec2 p){
  float n=fbm5(p+uSeed)*uWarp, n2=fbm(p*1.6+uSeed+3.14)*uWarp*0.5;
  float dir=p.x*cos(uAngle)+p.y*sin(uAngle);
  return sin((dir*3.+n*4.+n2*2.)*PI)*0.5+0.5;
}
float modeRings(vec2 p){
  float n=fbm(p*0.9+uSeed), n2=fbm(p*1.5+uSeed+7.3);
  float r=sqrt(dot(p,p)+0.04);   // softened radius: no center singularity / seam
  return sin((r+uWarp*(n*0.55+n2*0.2))*7.5*PI)*0.5+0.5;
}
float modeBands(vec2 p){
  float n=fbm5(p+uSeed), n2=fbm(p*0.7+vec2(uSeed+2.1,uSeed-1.3));
  vec2 perp=vec2(-sin(uAngle),cos(uAngle));
  return sin((dot(p,perp)*4.5+n*uWarp*5.+n2*uWarp*2.)*PI)*0.5+0.5;
}
float modeSpiral(vec2 p){
  float r=length(p), a=atan(p.y,p.x)/(2.*PI);
  float t=a+r*uWarp*1.2;
  float n=fbm(vec2(t*2.5,r*2.+uSeed));
  return fbm(vec2(t*2.+n*1.4,r*1.8+n*0.9)+uSeed+1.3);
}
float modeCells(vec2 p){
  vec2 wp=p+fbm(p+uSeed)*uWarp*0.6;
  vec2 cell=floor(wp); float minD=10.,minD2=10.;
  for(int dy=-2;dy<=2;dy++) for(int dx=-2;dx<=2;dx++){
    vec2 nc=cell+vec2(dx,dy);
    vec2 pt=nc+vec2(hash21(nc+uSeed),hash21(nc+uSeed+7.3));
    float d=length(wp-pt);
    if(d<minD){minD2=minD;minD=d;} else if(d<minD2){minD2=d;}
  }
  return smoothstep(0.,.5,minD2-minD);
}

vec3 palette(float t){
  t=clamp(t,0.,1.);
  if(t<0.25) return mix(uC0,uC1,t/0.25);
  if(t<0.50) return mix(uC1,uC2,(t-0.25)/0.25);
  if(t<0.75) return mix(uC2,uC3,(t-0.50)/0.25);
  return            mix(uC3,uC4,(t-0.75)/0.25);
}

void main(){
  vec2 c=(gl_FragCoord.xy-0.5*uRes)/uRes.y;
  vec2 p=c*uScale;

  float h;
  if     (uMode==0) h=modeFlow(p);
  else if(uMode==1) h=modeMarble(p);
  else if(uMode==2) h=modeRings(p);
  else if(uMode==3) h=modeBands(p);
  else if(uMode==4) h=modeSpiral(p);
  else              h=modeCells(p);

  vec2 g=vec2(dFdx(h),dFdy(h))*uRes.y;
  vec3 n=normalize(vec3(-g*uLight,1.));
  vec2 ld=vec2(cos(uAngle),sin(uAngle));
  float lam=dot(n,normalize(vec3(ld,0.7)))*0.5+0.5;

  float v=h*0.60+lam*0.62;
  v=(v-0.5)*uContrast+0.5;
  v=pow(clamp(v,0.,1.),1./uGamma);

  vec2 q2=vec2(fbm(p+uSeed),fbm(p+vec2(5.2,1.3)+uSeed));
  vec2 r2=vec2(fbm(p+uWarp*q2+vec2(1.7,9.2)),fbm(p+uWarp*q2+vec2(8.3,2.8)));
  float spine=1.-smoothstep(0.,uSpread,abs(c.x));
  float vfade=1.-smoothstep(0.40,0.52,abs(c.y));
  float blob=fbm(p*0.45+r2*0.5+uSeed*1.7)*0.6+spine*0.7;
  blob*=mix(0.55,1.,vfade);
  float mask=smoothstep(uThresh-uSoft,uThresh+uSoft,blob);

  vec3 col=palette(v)*mask;
  col+=(hash21(gl_FragCoord.xy)-0.5)*(uGrain*0.02);
  outColor=vec4(max(col,0.),1.);
}`;

/* ─── Constants ─────────────────────────────────────── */
const MODES = [
  {id:0,name:'Flow'  },{id:1,name:'Marble'},{id:2,name:'Rings'},
  {id:3,name:'Bands' },{id:4,name:'Spiral'},{id:5,name:'Cells'},
];

// base = px on the shorter side at 1× scale
const RATIOS = [
  {label:'9:16', w:9,  h:16, base:1080},
  {label:'1:1',  w:1,  h:1,  base:1080},
  {label:'4:5',  w:4,  h:5,  base:1080},
  {label:'3:4',  w:3,  h:4,  base:1080},
  {label:'16:9', w:16, h:9,  base:1080},
  {label:'3:2',  w:3,  h:2,  base:1080},
];

const SCALES = [
  {label:'1×', mult:1},
  {label:'2×', mult:2},
  {label:'4×', mult:4},
];

let currentMode  = 0;
let currentRatio = 0;   // index into RATIOS
let currentScale = 0;   // index into SCALES

/* ─── Params ────────────────────────────────────────── */
const params = {
  scale:    {v:0.85, min:0.15, max:8.0,  step:0.005, label:'Scale',     grp:'field' },
  warp:     {v:2.50, min:0.0,  max:8.0,  step:0.01,  label:'Warp',      grp:'field' },
  angle:    {v:1.05, min:0.0,  max:6.283,step:0.001, label:'Angle',     grp:'light' },
  light:    {v:1.60, min:0.0,  max:6.0,  step:0.01,  label:'Crease',    grp:'light' },
  spread:   {v:0.60, min:0.05, max:0.6,  step:0.005, label:'Spread',    grp:'mask'  },
  thresh:   {v:0.00, min:0.0,  max:1.0,  step:0.005, label:'Threshold', grp:'mask'  },
  soft:     {v:0.01, min:0.01, max:0.4,  step:0.005, label:'Softness',  grp:'mask'  },
  contrast: {v:1.30, min:0.5,  max:2.5,  step:0.01,  label:'Contrast',  grp:'finish'},
  gamma:    {v:1.10, min:0.5,  max:2.2,  step:0.01,  label:'Gamma',     grp:'finish'},
  grain:    {v:2.0,  min:0.0,  max:10.0, step:0.05,  label:'Grain',     grp:'finish'},
};

let palette = ['#000000','#5c0026','#e8197a','#ff6a1a','#ffd23a'];

const PRESETS = {
  'Magma':['#000000','#5c0026','#e8197a','#ff6a1a','#ffd23a'],
  'Cyan': ['#000208','#062b3d','#0fb6c6','#7df0d0','#eafff6'],
  'Ember':['#040000','#3a0a02','#c2320a','#ff8a1e','#ffe27a'],
  'Iris': ['#02000a','#1e0a4a','#6a36d9','#c46bff','#f3e6ff'],
  'Lime': ['#020600','#143a06','#5cba1a','#b6f02a','#f2ffd0'],
  'Mono': ['#000000','#222222','#777777','#cccccc','#ffffff'],
};

let seed = Math.random()*100;
let needsRender = true;
const invalidate = () => { needsRender = true; };

/* ─── Export size helper ────────────────────────────── */
function getExportSize(){
  const {w,h,base} = RATIOS[currentRatio];
  const mult = SCALES[currentScale].mult;
  const px = base * mult;
  // px = shorter side
  if(w <= h) return { W: px, H: Math.round(px * h / w) };
  else        return { W: Math.round(px * w / h), H: px };
}

/* ─── GL setup ──────────────────────────────────────── */
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', {antialias:true});
if(!gl){ document.body.innerHTML='<p style="margin:2rem auto;font-family:monospace">WebGL2 not supported.</p>'; throw 0; }

function compile(type,src){
  const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VERT));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FRAG));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const U={};
for(const n of ['uRes','uSeed','uScale','uWarp','uAngle','uLight','uContrast','uGamma','uGrain',
                 'uSpread','uThresh','uSoft','uMode','uC0','uC1','uC2','uC3','uC4'])
  U[n]=gl.getUniformLocation(prog,n);

gl.bindVertexArray(gl.createVertexArray());

function hex2rgb(h){ const v=parseInt(h.slice(1),16); return [((v>>16)&255)/255,((v>>8)&255)/255,(v&255)/255]; }

function setUniforms(w,h){
  gl.uniform2f(U.uRes,w,h);
  gl.uniform1f(U.uSeed,seed);
  gl.uniform1f(U.uScale,params.scale.v);
  gl.uniform1f(U.uWarp,params.warp.v);
  gl.uniform1f(U.uAngle,params.angle.v);
  gl.uniform1f(U.uLight,params.light.v);
  gl.uniform1f(U.uContrast,params.contrast.v);
  gl.uniform1f(U.uGamma,params.gamma.v);
  gl.uniform1f(U.uGrain,params.grain.v);
  gl.uniform1f(U.uSpread,params.spread.v);
  gl.uniform1f(U.uThresh,params.thresh.v);
  gl.uniform1f(U.uSoft,params.soft.v);
  gl.uniform1i(U.uMode,currentMode);
  const cols=palette.map(hex2rgb);
  gl.uniform3fv(U.uC0,cols[0]);gl.uniform3fv(U.uC1,cols[1]);
  gl.uniform3fv(U.uC2,cols[2]);gl.uniform3fv(U.uC3,cols[3]);gl.uniform3fv(U.uC4,cols[4]);
}

/* ─── Frame sizing ──────────────────────────────────── */
const frameEl = document.getElementById('frame');
const stageEl = document.getElementById('stage');

function updateFrameSize(){
  const {w,h} = RATIOS[currentRatio];
  const stageW = stageEl.clientWidth - 40;
  const stageH = stageEl.clientHeight - 40;
  let fw = stageW, fh = Math.round(stageW * h / w);
  if(fh > stageH){ fh = stageH; fw = Math.round(stageH * w / h); }
  frameEl.style.width  = fw + 'px';
  frameEl.style.height = fh + 'px';
  invalidate();
}

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const r = canvas.getBoundingClientRect();
  const cw = Math.round(r.width*dpr), ch = Math.round(r.height*dpr);
  if(canvas.width!==cw||canvas.height!==ch){ canvas.width=cw; canvas.height=ch; invalidate(); }
}

window.addEventListener('resize', ()=>{ updateFrameSize(); resize(); });

/* ─── Render loop ───────────────────────────────────── */
function frame(){
  resize();
  if(needsRender){
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);
    gl.viewport(0,0,canvas.width,canvas.height);
    setUniforms(canvas.width,canvas.height);
    gl.drawArrays(gl.TRIANGLES,0,3);
    needsRender=false;
  }
  requestAnimationFrame(frame);
}

/* ─── Export ────────────────────────────────────────── */
function exportPNG(){
  const btn=document.getElementById('exportBtn'); btn.classList.add('busy');
  const {W,H}=getExportSize();

  const tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,W,H,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  const fbo=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  gl.viewport(0,0,W,H); setUniforms(W,H); gl.drawArrays(gl.TRIANGLES,0,3);
  const px=new Uint8Array(W*H*4);
  gl.readPixels(0,0,W,H,gl.RGBA,gl.UNSIGNED_BYTE,px);
  gl.bindFramebuffer(gl.FRAMEBUFFER,null); gl.deleteFramebuffer(fbo); gl.deleteTexture(tex); invalidate();

  const out=document.createElement('canvas'); out.width=W; out.height=H;
  const ctx=out.getContext('2d'); const img=ctx.createImageData(W,H);
  for(let y=0;y<H;y++){ const s=(H-1-y)*W*4,d=y*W*4; img.data.set(px.subarray(s,s+W*4),d); }
  ctx.putImageData(img,0,0);
  out.toBlob(blob=>{
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    const {label}=RATIOS[currentRatio], sc=SCALES[currentScale].label.replace('×','x');
    a.download=`flux_${MODES[currentMode].name.toLowerCase()}_${label.replace(':','x')}_${sc}_${Date.now()}.png`;
    a.click(); URL.revokeObjectURL(a.href);
    btn.classList.remove('busy'); toast(`Exported · ${W}×${H} PNG`);
  },'image/png');
}

/* ─── UI helpers ────────────────────────────────────── */
function updateResLabels(){
  const {W,H}=getExportSize();
  const label=`${W} × ${H} px`;
  document.getElementById('resPreview').textContent=label;
  document.getElementById('resBadge').textContent=`${W} × ${H}`;
}

/* ─── UI build ──────────────────────────────────────── */

// Slider controls
function makeSlider(key){
  const p=params[key];
  const wrap=document.createElement('div'); wrap.className='ctrl';
  wrap.innerHTML=`<div class="row"><label>${p.label}</label><span class="val"></span></div>`;
  const inp=document.createElement('input');
  inp.type='range';inp.min=p.min;inp.max=p.max;inp.step=p.step;inp.value=p.v;
  const val=wrap.querySelector('.val');
  const fmt=v=>p.step<0.01?v.toFixed(3):v.toFixed(2);
  val.textContent=fmt(p.v);
  inp.addEventListener('input',()=>{ p.v=parseFloat(inp.value); val.textContent=fmt(p.v); invalidate(); });
  wrap.appendChild(inp); p._input=inp; p._val=val; p._fmt=fmt;
  return wrap;
}
for(const key in params) document.getElementById(params[key].grp+'-ctrls').appendChild(makeSlider(key));

// Mode buttons
const modeGrid=document.getElementById('modes');
MODES.forEach(m=>{
  const b=document.createElement('button'); b.className='grid-btn'+(m.id===0?' active':'');
  b.textContent=m.name;
  b.addEventListener('click',()=>{
    currentMode=m.id;
    modeGrid.querySelectorAll('.grid-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('modeStamp').textContent=m.name;
    invalidate();
  });
  modeGrid.appendChild(b);
});

// Ratio buttons
const ratioGrid=document.getElementById('ratios');
RATIOS.forEach((r,i)=>{
  const b=document.createElement('button'); b.className='grid-btn'+(i===0?' active':'');
  b.textContent=r.label;
  b.addEventListener('click',()=>{
    currentRatio=i;
    ratioGrid.querySelectorAll('.grid-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    updateResLabels(); updateFrameSize();
  });
  ratioGrid.appendChild(b);
});

// Scale buttons
const scaleRow=document.getElementById('scales');
SCALES.forEach((s,i)=>{
  const b=document.createElement('button'); b.className='scale-btn'+(i===0?' active':'');
  b.textContent=s.label;
  b.addEventListener('click',()=>{
    currentScale=i;
    scaleRow.querySelectorAll('.scale-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    updateResLabels();
  });
  scaleRow.appendChild(b);
});

// Swatches
function buildSwatches(){
  const c=document.getElementById('swatches'); c.innerHTML='';
  palette.forEach((hex,i)=>{
    const sw=document.createElement('div'); sw.className='sw'; sw.style.background=hex;
    const inp=document.createElement('input'); inp.type='color'; inp.value=hex;
    inp.addEventListener('input',()=>{ palette[i]=inp.value; sw.style.background=inp.value; invalidate(); });
    sw.appendChild(inp); c.appendChild(sw);
  });
}
buildSwatches();

// Presets
for(const name in PRESETS){
  const b=document.createElement('button'); b.className='preset'; b.textContent=name;
  b.addEventListener('click',()=>{ palette=PRESETS[name].slice(); buildSwatches(); invalidate(); });
  document.getElementById('presets').appendChild(b);
}

// Color randomizer
function hsl2hex(h,s,l){
  h=((h%360)+360)%360; s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const to=x=>Math.round(x*255).toString(16).padStart(2,'0');
  return '#'+to(f(0))+to(f(8))+to(f(4));
}
function randomizeColors(){
  const base=Math.random()*360, dir=Math.random()<0.5?1:-1, drift=40+Math.random()*70;
  palette=['#000000',
    hsl2hex(base,82,16),
    hsl2hex(base+dir*drift*0.3,88,46),
    hsl2hex(base+dir*drift*0.7,92,56),
    hsl2hex(base+dir*drift,95,70),
  ];
  buildSwatches(); invalidate();
}

document.getElementById('seedBtn').addEventListener('click',()=>{
  seed=Math.random()*100;
  params.angle.v=Math.random()*6.283;
  params.angle._input.value=params.angle.v;
  params.angle._val.textContent=params.angle._fmt(params.angle.v);
  invalidate();
});
document.getElementById('colorBtn').addEventListener('click', randomizeColors);
document.getElementById('exportBtn').addEventListener('click', exportPNG);

function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

// Init
randomizeColors();
updateFrameSize();
updateResLabels();
requestAnimationFrame(frame);
</script>
